name: Daily Gaming News Update

on:
  schedule:
    - cron: '30 5 * * *' # 05:30 UTC
  workflow_dispatch: # Permet de le lancer manuellement

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Fetch 2 New Articles
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            const path = './public/news.json';
            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            
            const newArticles = [
              {
                title: 'Nouveau tournoi Esport annoncé à Paris',
                body: 'Un événement majeur réunissant les meilleurs joueurs mondiaux sur plusieurs disciplines vient d\'être dévoilé.',
                url: 'https://insidergamingtriks.com',
                image: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800',
                source: 'Bot Insider',
                dateTimePub: new Date().toISOString(),
                topic: 'competition'
              },
              {
                title: 'Review Matériel : Le nouveau clavier optique',
                body: 'Nous avons testé le dernier clavier ultra-rapide conçu pour la compétition de haut niveau.',
                url: 'https://insidergamingtriks.com',
                image: 'https://images.unsplash.com/photo-1587202372775-e229f172b9d7?w=800',
                source: 'Bot Insider',
                dateTimePub: new Date().toISOString(),
                topic: 'materiel'
              }
            ];
            
            data.articles = [...newArticles, ...data.articles].slice(0, 10);
            data.generatedAt = new Date().toISOString();
            fs.writeFileSync(path, JSON.stringify(data, null, 2));
          "

      - name: Commit and push if changed
        run: |
          git config --global user.name 'NewsBot'
          git config --global user.email 'bot@insidergaming.tricks'
          git add public/news.json
          git commit -m "Bot: Update 2 news articles (05:30 AM)" || exit 0
          git push