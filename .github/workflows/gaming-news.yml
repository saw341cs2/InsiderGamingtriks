name: Gaming News Bot

on:
  schedule:
    - cron: '0 9 * * *'   # 9h00 UTC
    - cron: '0 18 * * *'  # 18h00 UTC
  workflow_dispatch:      # Permet de lancer manuellement

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm init -y && npm install axios

      - name: Fetch and post gaming news
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          node -e '
          const axios = require("axios");

          if (!process.env.NEWS_API_KEY) {
            console.error("❌ Erreur : NEWS_API_KEY n\'est pas défini dans les secrets.");
            process.exit(1);
          }

          axios.get("https://newsapi.org/v2/everything", {
            params: {
              q: "gaming",
              language: "en",
              sortBy: "publishedAt",
              pageSize: 2,
              apiKey: process.env.NEWS_API_KEY
            }
          })
          .then(response => {
            const articles = response.data.articles;
            if (articles.length === 0) {
              console.log("✅ Aucune nouvelle gaming trouvée.");
              return;
            }
            console.log(`✅ ${articles.length} nouvelles gaming trouvées :`);
            articles.forEach((article, index) => {
              console.log(`\n${index + 1}. ${article.title}\n   Lien : ${article.url}`);
            });

            // Poster sur Discord si le webhook est configuré
            if (process.env.DISCORD_WEBHOOK_URL) {
              console.log("\n📤 Envoi vers Discord...");
              articles.forEach(article => {
                axios.post(process.env.DISCORD_WEBHOOK_URL, {
                  content: `🎮 **${article.title}**\n${article.url}`
                });
              });
              console.log("✅ Envoyé sur Discord !");
            } else {
              console.log("\nℹ️ DISCORD_WEBHOOK_URL non configuré. Les news sont affichées dans les logs.");
            }
          })
          .catch(error => {
            console.error("❌ Erreur lors de la récupération des news :", error.message);
          });
          '
