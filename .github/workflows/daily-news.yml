name: Daily Gaming News

on:
  # Exécuter tous les jours à 7h00 (heure de Paris)
  schedule:
    - cron: '0 6 * * *'  # 6h UTC = 7h en hiver (Paris UTC+1)
  # Permet l'exécution manuelle
  workflow_dispatch:

jobs:
  publish-news:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -X POST "https://$SUPABASE_URL/functions/v1/publish-daily-news" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json"
