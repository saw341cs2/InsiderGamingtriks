name: Daily Gaming News

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-publish-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and transform gaming news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: node scripts/fetch-news.cjs

      - name: Copy news to docs
        run: cp public/news.json docs/news.json

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/news.json docs/news.json
          git commit -m "Daily gaming news - $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push || echo "Push failed"
          git checkout docs
          git pull origin main
          git checkout main -- docs && git commit -m "Update docs folder with new news" --allow-empty || echo "No docs changes"
          git push || echo "Docs push failed"
