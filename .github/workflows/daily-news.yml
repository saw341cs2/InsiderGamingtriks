name: Daily Gaming News

on:
  schedule:
    - cron: '30 4 * * *'
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-publish-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/fetch-news.cjs

      - name: Build site
        run: |
          npm install
          npm run build

      - name: Copy news.json to dist
        run: cp public/news.json dist/news.json

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          force: true
          single-commit: true

      - name: Commit news to main
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/news.json docs/news.json || true
          git diff --staged --quiet || git commit -m "Daily gaming news - $(date '+%Y-%m-%d %H:%M UTC')"
          git push || true
