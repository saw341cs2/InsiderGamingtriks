﻿name: Daily Gaming News & Deploy

on:
  schedule:
    - cron: '30 3 * * *' # S'exécute à 5h30 heure de Paris (UTC+2) chaque jour
  workflow_dispatch:      # Permet de le lancer manuellement

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch News and Build
        run: |
          node scripts/fetch-news.cjs
          npm run build
        env:
          VITE_NEWS_API_KEY: ${{ secrets.VITE_NEWS_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY || secrets.NEWS_API_KEY }}

      - name: Copy news into dist and sync docs
        run: |
          cp public/news.json dist/news.json || true
          rm -rf docs/*
          cp -R dist/. docs/

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          force: true
          single-commit: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit news and docs updates (if changed)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/news.json docs || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: daily news update [skip ci]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}