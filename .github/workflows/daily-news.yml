name: Daily Gaming News

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  fetch-and-publish-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch gaming news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: |
          # Simple curl to test API first
          curl -s "https://gnews.io/api/v4/search?q=gaming&lang=fr&max=10&apikey=$GNEWS_API_KEY" -o response.json
          
          # Check response
          cat response.json
          
          # If valid, copy to news.json
          if grep -q "articles" response.json; then
            cp response.json public/news.json
            echo "News saved!"
          else
            echo "API error"
            cat response.json
          fi

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/news.json || true
          git commit -m "Daily gaming news - $(date '+%Y-%m-%d')" || echo "No changes"
          git push || echo "Push failed"
