      - name: Fetch and transform gaming news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: |
          node scripts/fetch-news.mjs
          echo '--- Building site ---'
          npm run build 2>/dev/null || npm install && npm run build

      - name: Copy news to all locations
        run: |
          cp public/news.json news.json
          cp public/news.json docs/news.json
          cp public/news.json dist/news.json