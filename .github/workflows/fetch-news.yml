name: Fetch Gaming News

on:
  schedule:
    - cron: '0 6 * * *'  # 7h Paris
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch gaming news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          # Fetch news from NewsAPI
          RESPONSE=$(curl -s "https://newsapi.org/v2/everything?q=gaming+fps+esports&language=fr&sortBy=publishedAt&pageSize=6&apiKey=$NEWS_API_KEY")
          
          # Extract articles and format as JSON
          echo "$RESPONSE" | jq '{ articles: [.articles[:6] | {
            title: .title,
            body: (.description // .content // ""),
            url: .url,
            image: (.urlToImage // "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400&h=250&fit=crop"),
            dateTimePub: .publishedAt,
            source: .source.name
          }] }' > public/news.json
          
          echo "News fetched and saved to public/news.json"
          cat public/news.json

      - name: Commit and push news
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/news.json
          git commit -m "Update gaming news - $(date '+%Y-%m-%d')" || echo "No changes to commit"
          git push
