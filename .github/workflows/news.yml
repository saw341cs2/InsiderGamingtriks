name: Gaming News Bot

on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate news
        run: |
          echo "<h2>Gaming News $(date)</h2>" >> news.html
          echo "<p>New gaming update coming soon. Stay tuned for more gaming news.</p>" >> news.html

      - name: Commit changes
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Add daily gaming news" || echo "No changes"
          git push
